<!-- menu-principal.component.html -->
<div class="menu-general-container">
    <header class="menu-top-header" aria-label="Navegacion principal">
    <div class="menu-top-header__left">
      <div class="menu-top-header__avatar" aria-hidden="true"></div>
      <span class="menu-top-header__user">#Eric23</span>
    </div>

    <nav class="menu-top-header__nav">
      <a
        class="menu-top-header__link"
        routerLink="/menu-principal"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        Menu
      </a>
      <a class="menu-top-header__link" routerLink="/xuxedex" routerLinkActive="is-active">Xuxedex</a>
      <a class="menu-top-header__link" routerLink="/motxilla" routerLinkActive="is-active">Motxilla</a>
      <a class="menu-top-header__link" routerLink="/amics" routerLinkActive="is-active">Amics</a>
      <a class="menu-top-header__link" routerLink="/xat" routerLinkActive="is-active">Xat</a>
    </nav>

    <button class="menu-top-header__logout" type="button" (click)="logout()">Sortir</button>
  </header>
