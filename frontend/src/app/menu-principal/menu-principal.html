<!-- menu-principal.component.html -->
<div class="menu-general-container">
  <h1 class="titulo-general">MENÚ PRINCIPAL</h1>

  <div class="menu-grid-container">
    <div class="menu-grid">

      <!-- XUXEDEX -->
      <button class="btn-menu" routerLink="/xuxedex">
        <img src="/Xuxedex.png" alt="Xuxedex" />
        <span>XUXEDEX</span>
      </button>

      <!-- MOTXILLA -->
      <button class="btn-menu" routerLink="/inventario">
        <img src="/Moxilla.png" alt="Motxilla" />
        <span>MOTXILLA</span>
      </button>

      <!-- AMICS -->
      <button class="btn-menu" routerLink="/amics">
        <img src="/Amics.png" alt="Amics" />
        <span>AMICS</span>
      </button>

      <!-- BATALLA -->
      <button class="btn-menu" routerLink="/batalla">
        <img src="/Batalla.png" alt="Batalla" />
        <span>BATALLA</span>
      </button>

      <!-- XAT -->
      <button class="btn-menu" routerLink="/xat">
        <img src="/Xat.png" alt="Xat" />
        <span>XAT</span>
      </button>

      <!-- INFO USUARIO -->
      <button class="btn-menu" routerLink="/info-usuari">
        <img src="/Perfil.png" alt="Perfil" />
        <span>PERFIL</span>
      </button>

    </div>
  </div>

  <!-- SORTIR -->
  <div class="menu-footer">
    <!-- ADMIN (solo visible si es admin) -->
    @if ((authService.usuari$ | async)?.role === 'admin') {
      <button class="btn-admin" routerLink="/admin">
        <img src="/admin.png" alt="Admin" />
        <span>ADMIN</span>
      </button>
    }

    <button class="btn-sortir" (click)="logout()">
      <img src="/Sortir.png" alt="Salida" />
      <span>SORTIR</span>
    </button>
  </div>
